{% extends "base/admin_base.html" %}
{% load crispy_forms_tags %}
{% block title %}Adicionar Exemplar — {{ livro.titulo }}{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-white">
          <h4 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Adicionar Exemplar</h4>
          <small class="text-muted">{{ livro.titulo }}</small>
        </div>
        <div class="card-body p-4">
          {% crispy form %}
        </div>
      </div>
      <div class="mt-3">
        <a href="{% url 'acervo:detalhe_livro' livro.pk %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Voltar</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
