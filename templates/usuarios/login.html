{% extends "base/public_base.html" %}
{% load crispy_forms_tags %}
{% block title %}Login — Biblioteca de Gravatá{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow border-0">
        <div class="card-body p-4">
          <div class="text-center mb-4">
            <i class="bi bi-lock-fill display-4 text-primary"></i>
            <h3 class="mt-2 fw-bold">Área Administrativa</h3>
            <p class="text-muted">Acesso restrito a funcionários</p>
          </div>
          {% crispy form %}
          <div class="text-center mt-3">
            <a href="{% url 'consulta:index' %}" class="text-muted small"><i class="bi bi-arrow-left me-1"></i>Voltar ao site público</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
