{% extends "base/public_base.html" %}
{% load crispy_forms_tags %}
{% block title %}Acesso Restrito — Biblioteca de Gravatá{% endblock %}

{% block content %}
<div style="background: var(--creme); min-height: calc(100vh - 130px); display: flex; align-items: center;">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5">

        <div class="text-center mb-4">
          <div style="width:60px; height:60px; background:var(--azul); border-radius:50%; display:inline-flex; align-items:center; justify-content:center; margin-bottom:1rem;">
            <i class="bi bi-lock-fill text-white fs-4"></i>
          </div>
          <h3 style="font-family:'Playfair Display',serif; color:var(--azul);">Área Administrativa</h3>
          <p class="text-muted small">Acesso exclusivo para funcionários da biblioteca</p>
        </div>

        <div class="card">
          <div class="card-body p-4">
            {% crispy form %}
          </div>
        </div>

        <div class="text-center mt-3">
          <a href="{% url 'consulta:index' %}" class="text-muted small">
            <i class="bi bi-arrow-left me-1"></i>Voltar ao site público
          </a>
        </div>

      </div>
    </div>
  </div>
</div>
{% endblock %}
